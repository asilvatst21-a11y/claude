name: Sync Match Results

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://palpitai.vercel.app/api/cron/sync-matches)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE | $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Sync falhou com HTTP $HTTP_CODE — verifique CRON_SECRET no GitHub Secrets"
            exit 1
          fi
